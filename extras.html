    <div id="quiz-container">
        <h2 id="question-text">Loading geography quiz...</h2>
        <div id="options-container"></div>
        <button id="submit-btn" py-click="check_answer" style="display: none;">Lock in answer</button>
        <p id="result-message"></p>

    <script type="py">
        from pyscript import document

        quiz_data = [
            {
                "question": "Which country borders, but doesn't enclave 2 micronations?",
                "options": ["United Kingdom", "France", "Italy", "Spain"],
                "answer": "France"
            },
            {
                "question": "Which of these countries is landlocked?",
                "options": ["Bosnia and Herzegovina", "Cambodia", "Uruguay", "Azerbaijan"],
                "answer": "Azerbaijan"
            },
            {
                "question": "Which country has cities called London, Paris, Banana and Poland?",
                "options": ["Kiribati", "Canada", "New Zealand", "Christmas Island"],
                "answer": "Kiribati"
            },
            {
                "question": "Where is South Georgia and the South Sandwich Islands?",
                "options": ["Africa", "Asia", "South America", "The middle of nowhere"],
                "answer": "Africa"
            },
            {
                "question": "Which of these countries has the LOWEST cost of living?",
                "options": ["Morocco", "China", "Ukraine", "Bangladesh"],
                "answer": "Bangladesh"
            },
            {
                "question": "Which of these countries is forecasted to have an ageing population?",
                "options": ["United States", "India", "South Korea", "Italy"],
                "answer": "South Korea"

            },
            {
                "question": "Which of these countries WASN'T colonised?",
                "options": ["Italy", "Belize", "Liberia", "Spain"],
                "answer": "Liberia"
            },
            {
                "question": "What is the capital of Turkiye? (Turkey)",
                "options": ["Ankara", "Istanbul", "Antalaya", "Bursa"],
                "answer": "Ankara"
            },
            {
                "question": "What is the capital of Liechtenstein?",
                "options": ["Poznan", "Zurich", "Vaduz", "Liechtenstein"],
                "answer": "Vaduz"
            },
            {
                "question": "Which country borders the most countries?",
                "options": ["Germany", "China", "United States", "Russia"],
                "answer": "China"
            }
        ]

        current_question_index = 0
        score = 0

        def load_question():
            global current_question_index

            if current_question_index < len(quiz_data):
                q = quiz_data[current_question_index]

                document.getElementById("question-text").innerText = q["question"]
                document.getElementById("submit-btn").style.display = "block"

                options_div = document.getElementById("options-container")
                options_div.innerHTML = ""

                for option in q["options"]:
                    label = document.createElement("label")
                    label.className = "option-label"

                    radio = document.createElement("input")
                    radio.type = "radio"
                    radio.name = "quiz-option"
                    radio.value = option

                    label.appendChild(radio)
                    label.append(f" {option}")
                    options_div.appendChild(label)
            else:
                show_final_score()

        def check_answer(event):
            global current_question_index, score

            selected = document.querySelector('input[name="quiz-option"]:checked')

            if not selected:
                document.getElementById("result-message").innerText = "Select an answer first!"
                return

            correct_answer = quiz_data[current_question_index]["answer"]
            if selected.value == correct_answer:
                score += 1

            current_question_index += 1
            document.getElementById("result-message").innerText = "" # Clear errors
            load_question()

        def show_final_score():
            document.getElementById("question-text").innerText = "Quiz Completed!"
            document.getElementById("options-container").innerHTML = ""
            document.getElementById("submit-btn").style.display = "none"

            result_element = document.getElementById("result-message")
            result_element.id = "final-score"
            result_element.innerText = f"Your score: {score} out of {len(quiz_data)}!"

        load_question()
    </script>

<script type="py">
    import random
    from pyscript import document

    target_number = random.randint(1, 1000)
    attempts = 0

    document.getElementById("loading").style.display = "none"

    def check_guess(event):

        global target_number, attempts

        input_element = document.getElementById("user_guess")
        result_element = document.getElementById("result")
        submit_btn = document.getElementById("submit_btn")
        reset_btn = document.getElementById("reset_btn")

        user_input = input_element.value

        if not user_input:
            result_element.innerText = "Please enter a number"
            result_element.style.color = "yellow"
            return

        guess = int(user_input)
        attempts += 1

        if guess == target_number:
            result_element.innerText = f"Yay that is correct! You found it in {attempts} tries."
            result_element.style.color = "green"

            submit_btn.style.display = "none"
            reset_btn.style.display = "inline-block"

        elif guess < target_number:
            result_element.innerText = f"{guess} is too low. Try again."
            result_element.style.color = "yellow"
            input_element.value = ""

        else:
            result_element.innerText = f"{guess} is too high. Try again."
            result_element.style.color = "yellow"
            input_element.value = ""

    def reset_game(event):

        global target_number, attempts

        target_number = random.randint(1, 1000)
        attempts = 0

        document.getElementById("user_guess").value = ""
        document.getElementById("result").innerText = ""
        document.getElementById("submit_btn").style.display = "inline-block"
        document.getElementById("reset_btn").style.display = "none"
</script>

    <script type="py">
        from pyscript import when, display, document

        def get_display():
            return document.getElementById("display").value

        def set_display(value):
            document.getElementById("display").value = value

        @when("click", ".btn-num")
        def add_number(event):
            current = get_display()
            clicked_number = event.target.innerText
            set_display(current + clicked_number)

        @when("click", ".btn-op")
        def add_operator(event):
            current = get_display()
            clicked_op = event.target.innerText
            if current and current[-1] not in "+-*/":
                set_display(current + clicked_op)

        @when("click", "#clear")
        def clear_display(event):
            set_display("")

        @when("click", "#equal")
        def calculate(event):
            expression = get_display()
            try:
                result = eval(expression)
                set_display(str(result))
            except Exception:
                set_display("Error")
    </script>
